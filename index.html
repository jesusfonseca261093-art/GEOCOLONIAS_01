<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen Checklist - Control de Unidades</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/componets.css">
    
    <!-- Leaflet CSS para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Iconos modernos (Boxicons) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- Fuentes modernas (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body, input, button, textarea, select {
            font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
        }
    </style>
</head>
<body>
    <!-- Menú Lateral Global (Sidebar) -->
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleMenu()"></div>
    <div id="sidebarMenu" class="sidebar-menu">
        <div class="sidebar-header" style="background: #1e40af; color: white;">
            <img id="sidebarLogoImg" src="img/Logo.png" alt="Logo" style="height: 35px; object-fit: contain;">
            <button onclick="toggleMenu()" class="btn-icon" style="color: white;"><i class='bx bx-x'></i></button>
        </div>
        <div class="sidebar-content">
            <a onclick="navigateFromMenu('home')"><i class='bx bx-home-alt'></i> Inicio</a>
            <a onclick="navigateFromMenu('form')"><i class='bx bx-list-check'></i> Nuevo Check List</a>
            <a onclick="navigateFromMenu('orden-servicio')"><i class='bx bx-wrench'></i> Orden de Servicio</a>
            <a onclick="navigateFromMenu('admin-panel')"><i class='bx bx-shield-quarter'></i> Panel Supervisor</a>
            <a onclick="navigateFromMenu('taller-panel')"><i class='bx bx-car'></i> Panel Taller</a>
            <a onclick="navigateFromMenu('geocercas')"><i class='bx bx-map-alt'></i> Geocercas</a>
            <a onclick="navigateFromMenu('supervision-form')"><i class='bx bx-user-pin'></i> Supervisión en Campo</a>
            <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 15px 0;">
            <a onclick="AuthController.logout(); toggleMenu()" style="color: #dc2626;"><i class='bx bx-log-out'></i> Cerrar Sesión</a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebarMenu').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
        function navigateFromMenu(step) {
            if (typeof App !== 'undefined') App.goToStep(step);
            toggleMenu();
        }
    </script>

    <div id="app"></div>

    <!-- Librería para generar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Librería EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <!-- Librería Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Librería Chart.js para gráficas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Leaflet JS para el mapa (AGREGADO AQUÍ) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- 1. Modelos y Datos -->
    <script src="js/models/data.js"></script>
    <script src="js/models/storage.js"></script>

    <!-- 2. Controladores de Utilidad -->
    <script src="js/controllers/modal-controller.js"></script>
    <script src="js/controllers/signature-controller.js"></script>
    <script src="js/controllers/auth-controller.js"></script>

    <!-- 3. Controladores de Lógica -->
    <script src="js/controllers/form-controller.js"></script>
    <script src="js/controllers/orden-controller.js"></script>
    <script src="js/controllers/admin-controller.js"></script>
    <script src="js/controllers/supervision-controller.js"></script>

    <!-- 4. Vistas -->
    <script src="js/views/home.js"></script>
    <script src="js/views/auth.js"></script>
    <script src="js/views/form.js"></script>
    <script src="js/views/checklist-verificar.js"></script>
    <script src="js/views/orden-servicio.js"></script>
    <script src="js/views/orden-verificar.js"></script>
    <script src="js/views/admin.js"></script>
    <script src="js/views/success.js"></script>
    <script src="js/views/geocercas.js"></script>
    <script src="js/views/supervision.js"></script>
    <script src="js/views/mapa-quejas.js"></script>  

    <!-- 5. Aplicación Principal -->
    <script src="js/app.js"></script>
    
</body>
</html>
